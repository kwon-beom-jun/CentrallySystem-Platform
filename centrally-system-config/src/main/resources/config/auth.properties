
server.servlet.context-path=/auth

server.port=9001
server.address=0.0.0.0

# Graceful Shutdown 설정 (무중단 배포)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

auth.eureka.server.ip=localhost
auth.server.ip=localhost:9001
#auth.server.ip=192.168.1.100:9001

frontend.domain=http://localhost:3000
#frontend.domain=http://192.168.1.100:3000

kafka.server.ip=localhost:9092

eureka.server.ip=http://localhost:8761/eureka/

# 직접 호출이므로 뚤려있어야함 (추후 게이트웨이 통해서?)
rest.hrm.service=http://localhost:9999/hrm

# -----------------------------------------------------------------
# Redirect 설정
# -----------------------------------------------------------------

# OAuth2 성공 후 리다이렉트 경로
# ex) http://localhost:8088
oauth.success.redirect.frontend-url=${frontend.domain}/#/auth/oauth-call-back

# (공통)OAuth2 실패 시 리다이렉트 경로
# ex) http://localhost:8088
oauth.fail.redirect.frontend-url=${frontend.domain}/#/auth/oauth-call-back?error=

# OAuth2 실패 시 리다이렉트 경로
# ex) http://localhost:8088
oauth.fail.already.login.redirect.frontend-url=${frontend.domain}/#/auth/oauth-call-back?error=alreadyLoggedIn

# OAuth2 소셜 정보가 DB에 존재하지 않을때 로그인 페이지로 암호화값을 포함해서 전달
# ex) http://localhost:8088
oauth.social.no.search.redirect.frontend-url=${frontend.domain}/#/?search=fail

# 로그인 페이지 
# ex) http://localhost:8088/login-page
#login.page.redirect.frontend-url=/login-page
login.page.redirect.frontend-url=${frontend.domain}/#/



# -----------------------------------------------------------------
# Kafka 설정
# -----------------------------------------------------------------

# Kafka 공통 설정
spring.kafka.bootstrap-servers=${kafka.server.ip}

# Producer 전용 설정 (자동 구성에 의해 사용)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=2
spring.kafka.producer.linger-ms=50

# Consumer 전용 공통 설정 (properties에만 넣어두고, 그룹 아이디 등 확장은 Config에서 처리)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false



# -----------------------------------------------------------------
# Mail 발송 관련 설정
# -----------------------------------------------------------------

# 구글 SMTP 서버 설정
#################################################
# 	※ 중요 ※ 									#
# 	발송 메일은 보안 설정에 따라서 달라짐					#
# 	설정 > 보안									#
# 		1. 2단계 인증이 사용중인지					#
# 		2. 보안 수준이 낮은 앱의 액세스 : 허용으로 설정	#
#################################################
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dummy_email@example.com
spring.mail.password=dummy_mail_password_123456
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
logging.level.org.springframework.boot.autoconfigure.mail=DEBUG



# ========================= Eureka 설정 =========================
# Eureka에 등록되는 어플리케이션 이름과 인스턴스 ID 지정
eureka.instance.appname=centrally-system-auth
eureka.instance.instanceId=${auth.eureka.server.ip}:${spring.application.name}:${server.port}
# 메타데이터에 컨텍스트 경로 포함 (선택 사항)
#eureka.instance.metadataMap.contextPath=${server.servlet.context-path}

# ※ 중요 ※ 
# "Gateway 라우팅 설정-1", "Gateway 라우팅 설정-2" 는 필요하고, 
# pom.xml에 "spring-cloud-starter-netflix-eureka-client"가 있어야함
eureka.client.service-url.defaultZone=${eureka.server.ip}
eureka.client.enabled=true
